<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting…</title>
  <script>
    (function(){
      var saved = localStorage.getItem('lang');
      if (saved && ['en','ru','zh'].indexOf(saved) !== -1) {
        location.replace('/' + saved + '/');
        return;
      }
      var langs = (navigator.languages || [navigator.language || 'en']);
      for (var i = 0; i < langs.length; i++) {
        var l = langs[i].toLowerCase();
        if (l.indexOf('ru') === 0) { location.replace('/ru/'); return; }
        if (l.indexOf('zh') === 0) { location.replace('/zh/'); return; }
      }
      location.replace('/en/');
    })();
  </script>
  <meta http-equiv="refresh" content="1; url=/en/">
  <link rel="canonical" href="/en/">
</head>
<body>
  <p>Redirecting to <a href="/en/">English</a> · <a href="/ru/">Русский</a> · <a href="/zh/">中文</a></p>
</body>
</html>
