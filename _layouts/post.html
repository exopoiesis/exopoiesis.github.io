---
layout: default
---
<main class="page">
  <div class="container">
    <article class="post">
      <header class="post-header">
        <h1>{{ page.title }}</h1>
        <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">
          {{ page.date | date: "%B %-d, %Y" }}
        </time>
      </header>
      <div class="prose">
        {{ content }}
      </div>
    </article>
  </div>
</main>
