---
layout: default
---
<main class="page">
  <div class="container">
    <article class="vision">
      <header class="vision-header">
        <h1>{{ page.title }}</h1>
        {% if page.subtitle %}<p class="vision-subtitle">{{ page.subtitle }}</p>{% endif %}
      </header>
      <div class="prose">
        {{ content }}
      </div>
    </article>
  </div>
</main>
